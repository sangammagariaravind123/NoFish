<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 360px;
      padding: 15px;
      font-family: sans-serif;
      box-sizing: border-box;
      background: #f6f8fb;
    }

    * {
      box-sizing: border-box;
    }

    h3 {
      margin: 0;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .risk {
      font-weight: bold;
      margin: 10px 0;
    }

    .safe { color: green; }
    .suspicious { color: orange; }
    .phishing { color: red; }
    .unknown { color: gray; }

    .trust {
      font-size: 1.2rem;
      margin: 5px 0;
    }

    hr {
      margin: 10px 0;
    }

    .rules {
      font-size: 0.9rem;
      color: #555;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
    }

    button:active {
      background-color: #45a049;
    }

    .loading {
      display: none;
      margin-top: 10px;
      font-style: italic;
      color: #888;
    }

    .why-btn {
      background-color: #2196F3;
      margin-top: 5px;
    }

    .nested-btn {
      background-color: #6c757d;
      margin-top: 8px;
    }

    .explanation-box {
      background-color: #f0f0f0;
      border-radius: 4px;
      padding: 8px;
      margin-top: 8px;
      font-size: 0.85rem;
      display: none;
      text-align: left;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
      max-height: 380px;
      overflow-y: auto;
    }

    .url-line {
      display: block;
      margin-top: 2px;
      margin-bottom: 10px;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
      line-height: 1.35;
    }

    .request-list {
      display: none;
      margin-top: 8px;
      padding-left: 18px;
      max-height: 180px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding-top: 8px;
      padding-right: 8px;
      padding-bottom: 8px;
    }

    .request-list li {
      margin-bottom: 8px;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
      line-height: 1.35;
    }

    .small-text {
      font-size: 0.85rem;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
      margin-bottom: 10px;
    }

    .auth-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .auth-row input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #d3dce6;
    }

    .secondary-btn {
      background: #1d4ed8;
    }

    .ghost-btn {
      background: #e2e8f0;
      color: #1f2937;
    }

    .compact-btn {
      margin-top: 0;
      width: auto;
      font-size: 12px;
      padding: 6px 10px;
    }

    .message {
      margin-top: 8px;
      font-size: 12px;
      color: #2563eb;
    }

    .message.error {
      color: #b91c1c;
    }

    .auth-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
    }

    .auth-email {
      font-weight: bold;
      margin-top: 4px;
    }

    .detail-block {
      margin-top: 8px;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .detail-block.compact {
      background: #f8fafc;
      padding: 8px;
      border-radius: 6px;
    }

    mark {
      background: #fde68a;
      padding: 0 2px;
    }
  </style>
</head>
<body>
  <div class="header-row">
    <h3>PhishGuard</h3>
    <div class="header-actions">
      <button id="dashboardBtn" class="ghost-btn compact-btn">Dashboard</button>
      <button id="settingsBtn" class="ghost-btn compact-btn">Settings</button>
    </div>
  </div>

  <div class="card">
    <div id="accountState"></div>
    <div id="authActions" class="auth-row"></div>
    <div id="authForm" class="stack" style="display:none;">
      <div id="authFormTitle" class="auth-label"></div>
      <div class="auth-row">
        <input id="displayNameInput" type="text" placeholder="Display name (optional)">
        <input id="emailInput" type="email" placeholder="Email">
        <input id="passwordInput" type="password" placeholder="Password">
      </div>
      <div class="auth-row">
        <button id="loginBtn" class="secondary-btn">Login</button>
        <button id="signupBtn">Sign Up</button>
        <button id="cancelAuthBtn" class="ghost-btn">Cancel</button>
      </div>
    </div>
    <div id="authMessage" class="message"></div>
  </div>

  <div class="card">
    <div id="result">Loading...</div>
    <button id="deepScanBtn">Deep Scan (Sandbox)</button>
    <div id="loading" class="loading">Analyzing in sandbox... please wait ~10 seconds</div>
    <div class="auth-row">
      <button id="whyBtn" class="why-btn" style="display:none;">Show Why</button>
      <button id="explainModeBtn" class="ghost-btn">Mode: Simple</button>
    </div>
    <div id="explanationBox" class="explanation-box"></div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
