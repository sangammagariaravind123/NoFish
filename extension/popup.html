<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: sans-serif;
    }
    h3 {
      margin-top: 0;
    }
    .risk {
      font-weight: bold;
      margin: 10px 0;
    }
    .safe { color: green; }
    .suspicious { color: orange; }
    .phishing { color: red; }
    .unknown { color: gray; }
    .trust {
      font-size: 1.2rem;
      margin: 5px 0;
    }
    hr {
      margin: 10px 0;
    }
    .rules {
      font-size: 0.9rem;
      color: #555;
    }
    button {
      margin-top: 10px;
      padding: 8px 12px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
    }
    button:active {
      background-color: #45a049;
    }
    .loading {
      display: none;
      margin-top: 10px;
      font-style: italic;
      color: #888;
    }
  </style>
</head>
<body>
  <h3>PhishGuard</h3>
  <div id="result">Loading...</div>
  <button id="deepScanBtn">🔍 Deep Scan (Sandbox)</button>
  <div id="loading" class="loading">Analyzing in sandbox... please wait ~10 seconds</div>
  <script src="popup.js"></script>
</body>
</html>
